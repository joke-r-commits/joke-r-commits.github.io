<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Encompassing</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; }
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
    .login-box { text-align: center; width: 300px; }
    .login-box h1 { font-size: 24px; font-weight: 400; margin-bottom: 40px; color: #333; }
    .login-box input { width: 100%; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
    .login-box input:focus { border-color: #333; }
    .login-box button { width: 100%; padding: 12px; background: #333; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .login-box button:hover { background: #555; }
    .error-msg { color: #e74c3c; font-size: 13px; margin-top: 12px; display: none; }
          .dashboard { display: none; }
    .tab-bar { display: flex; border-bottom: 1px solid #eee; padding: 0 20px; background: #fafafa; }
    .tab { padding: 12px 24px; cursor: pointer; font-size: 14px; color: #666; border-bottom: 2px solid transparent; }
    .tab:hover { color: #333; }
    .tab.active { color: #333; border-bottom-color: #333; }
    .tab-content { display: flex; justify-content: center; align-items: center; height: calc(100vh - 90px); }
    .tab-content h1 { font-size: 28px; font-weight: 300; color: #333; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #eee; }
    .top-bar span { font-size: 14px; color: #999; }
    .logout-btn { background: none; border: 1px solid #ddd; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; color: #666; }
    .logout-btn:hover { border-color: #333; color: #333; }
    .welcome-message { position: absolute; top: 40px; left: 0; right: 0; text-align: center; }
    .welcome-message p { font-size: 32px; font-weight: 300; color: #333; margin: 0; }
  </style>
    </head>
    <body>
      <div class="login-container" id="loginPage">
        <div class="welcome-message">
          <p>Welcome to Jack's website</p>
        </div>
        <div class="login-box">
          <h1>Sign In</h1>
          <input type="text" id="username" placeholder="Username" autocomplete="off">
          <input type="password" id="password" placeholder="Password">
          <button onclick="login()">Sign In</button>
          <p class="error-msg" id="errorMsg">Invalid username or password</p>
        </div>
      </div>
      <div class="dashboard" id="dashboard">
        <div class="top-bar">
          <span>Welcome, Jack</span>
          <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
        <div class="tab-bar">
          <div class="tab active" data-page="1" onclick="switchTab(this)">1</div>
          <div class="tab" data-page="2" onclick="switchTab(this)">2</div>
          <div class="tab" data-page="3" onclick="switchTab(this)">3</div>
          <div class="tab" data-page="4" onclick="switchTab(this)">4</div>
        </div>
        <div class="tab-content" id="tabContent">
          <h1 id="pageTitle">Welcome to Page 1</h1>
        </div>
      </div>
      <script>
            const API_URL = 'https://theencompassing-backend.onrender.com';
    window.onload = function() {
      const token = localStorage.getItem('token');
      if (token) verifyToken(token);
};
    async function verifyToken(token) {
      try {
        const res = await fetch(API_URL + '/api/verify', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (data.valid) showDashboard();
        else localStorage.removeItem('token');
} catch(e) { showDashboard(); }
}
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      try {
        const res = await fetch(API_URL + '/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (data.success) { localStorage.setItem('token', data.token); errorMsg.style.display = 'none'; showDashboard(); }
        else { errorMsg.style.display = 'block'; }
} catch(e) { errorMsg.textContent = 'Server unavailable.'; errorMsg.style.display = 'block'; }
}
    function showDashboard() { document.getElementById('loginPage').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; }
    function switchTab(el) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); document.getElementById('pageTitle').textContent = 'Welcome to Page ' + el.getAttribute('data-page'); }
    function logout() { localStorage.removeItem('token'); document.getElementById('dashboard').style.display = 'none'; document.getElementById('loginPage').style.display = 'flex'; document.getElementById('username').value = ''; document.getElementById('password').value = ''; }
  </script>
</body>
</html>
